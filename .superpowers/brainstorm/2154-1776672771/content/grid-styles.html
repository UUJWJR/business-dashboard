<h2>画布网格样式选择</h2>
<p class="subtitle">请为 16:9 画布选择可用的网格背景样式</p>

<div class="cards">
  <div class="card" data-choice="none" onclick="toggleSelect(this)">
    <div class="card-image" style="padding: 0;">
      <div style="width: 100%; height: 120px; background: white; border: 1px solid #e2e8f0; display: flex; align-items: center; justify-content: center;">
        <span style="color: #94a3b8; font-size: 12px;">无网格 - 纯白背景</span>
      </div>
    </div>
    <div class="card-body">
      <h3>无网格</h3>
      <p>纯白/纯色背景，无辅助线，最简洁</p>
    </div>
  </div>

  <div class="card" data-choice="dot" onclick="toggleSelect(this)">
    <div class="card-image" style="padding: 0;">
      <div style="width: 100%; height: 120px; background: white; border: 1px solid #e2e8f0; display: flex; align-items: center; justify-content: center; position: relative;">
        <div style="position: absolute; inset: 0; background-image: radial-gradient(circle, #cbd5e1 1px, transparent 1px); background-size: 12px 12px;"></div>
        <span style="position: relative; color: #64748b; font-size: 12px;">点阵网格</span>
      </div>
    </div>
    <div class="card-body">
      <h3>点阵</h3>
      <p>圆点网格，柔和不干扰，PPT 常用</p>
    </div>
  </div>

  <div class="card" data-choice="grid" onclick="toggleSelect(this)">
    <div class="card-image" style="padding: 0;">
      <div style="width: 100%; height: 120px; background: white; border: 1px solid #e2e8f0; display: flex; align-items: center; justify-content: center; position: relative;">
        <div style="position: absolute; inset: 0; background-image: linear-gradient(to right, #e2e8f0 1px, transparent 1px), linear-gradient(to bottom, #e2e8f0 1px, transparent 1px); background-size: 20px 20px;"></div>
        <span style="position: relative; color: #64748b; font-size: 12px;">线条网格</span>
      </div>
    </div>
    <div class="card-body">
      <h3>网格线</h3>
      <p>十字线网格，对齐最精确，设计常用</p>
    </div>
  </div>
</div>

<div class="section" style="margin-top: 20px;">
  <p style="font-size: 11px; color: #64748b;">💡 提示：网格样式可在属性面板中切换，也可以设置网格间距（如 8px / 12px / 20px）</p>
</div>

<h2>保存 vs 提交机制</h2>
<p class="subtitle">你提到的"保存=存盘可修改"和"提交=交付"具体是什么流程？</p>

<div class="mockup">
  <div class="mockup-header">保存/提交流程示意</div>
  <div class="mockup-body" style="padding: 16px; font-size: 11px;">
    <div style="display: flex; gap: 16px;">
      <div style="flex: 1; border: 1px solid #3b82f6; border-radius: 8px; padding: 12px; background: #eff6ff;">
        <div style="font-weight: bold; color: #3b82f6; margin-bottom: 8px;">💾 保存（Save）</div>
        <div style="font-size: 10px; line-height: 1.6;">
          <p>• 保存当前编辑进度</p>
          <p>• 可继续修改编辑</p>
          <p>• 可多次保存</p>
          <p>• 相当于"草稿"</p>
        </div>
      </div>
      
      <div style="flex: 1; border: 1px solid #10b981; border-radius: 8px; padding: 12px; background: #ecfdf5;">
        <div style="font-weight: bold; color: #10b981; margin-bottom: 8px;">✅ 提交（Submit）</div>
        <div style="font-size: 10px; line-height: 1.6;">
          <p>• 最终交付版本</p>
          <p>• 锁定不可再编辑</p>
          <p>• 生成可分享的文件</p>
          <p>• 相当于"发布"</p>
        </div>
      </div>
    </div>
    
    <div style="margin-top: 16px; padding: 12px; background: #fef3c7; border-radius: 6px; font-size: 10px;">
      <div style="font-weight: bold; margin-bottom: 6px;">❓ 需要确认的问题：</div>
      <p>1. 存储方式：是纯前端（localStorage/下载文件），还是需要后端服务？</p>
      <p>2. "提交"后是只读查看，还是可以导出为 PPT/PDF？</p>
      <p>3. 是否需要版本历史（保存多个版本）？</p>
    </div>
  </div>
</div>
